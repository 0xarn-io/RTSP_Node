# RTSP node config. This file is TRACKED in git, so keep only placeholder
# credentials here. For real cameras, point RTSP_NODE_CONFIG at a private
# config file kept outside the repo (or inject credentials at deploy time).

[server]
host = "0.0.0.0"
port = 8000

[[cameras]]
id = "front_door"
name = "Front Door"
url = "rtsp://user:password@192.168.1.10:554/Streaming/Channels/101"
# Optional: refuse to serve frames older than this many seconds (0 = disabled).
max_frame_age_s = 0.0

[[cameras]]
id = "backyard"
name = "Backyard"
url = "rtsp://user:password@192.168.1.11:554/Streaming/Channels/101"
